name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Generate .icns icon (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p src-tauri/icons/icon.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size src-tauri/icons/icon.png --out src-tauri/icons/icon.iconset/icon_${size}x${size}.png
            double=$((size * 2))
            sips -z $double $double src-tauri/icons/icon.png --out src-tauri/icons/icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns src-tauri/icons/icon.iconset -o src-tauri/icons/icon.icns
          # Add .icns to the Tauri icon list for macOS bundling
          sed -i '' 's|"icons/icon.png"|"icons/icon.png",\n        "icons/icon.icns"|' src-tauri/tauri.conf.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AgentPulse ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install AgentPulse.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} ${{ matrix.bundles && format('--bundles {0}', matrix.bundles) || '' }}

      - name: Create Windows portable zip
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $exe = "src-tauri/target/${{ matrix.target }}/release/AgentPulse.exe"
          $zip = "AgentPulse-${{ github.ref_name }}-x64-portable.zip"
          Compress-Archive -Path $exe -DestinationPath $zip

      - name: Upload Windows portable zip
        if: matrix.os == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} "AgentPulse-${{ github.ref_name }}-x64-portable.zip" --clobber
