<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClaudePulse</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="capsule" class="capsule">
    <!-- Title bar -->
    <div class="title-bar" data-tauri-drag-region>
      <span class="title-text" data-tauri-drag-region>Claude Pulse</span>
      <button class="settings-btn" id="settingsBtn" title="Settings" aria-label="Open settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <!-- Session list (always visible) -->
    <div class="session-list" id="sessionList"></div>

    <!-- Settings panel -->
    <div class="settings-panel" id="settingsPanel" style="display:none">
      <div class="settings-section">
        <label class="settings-label">Accent Color</label>
        <div class="settings-row">
          <button class="color-btn" data-color="purple" style="--btn-color: #a78bfa" aria-label="Purple accent"></button>
          <button class="color-btn" data-color="cyan" style="--btn-color: #22d3ee" aria-label="Cyan accent"></button>
          <button class="color-btn" data-color="green" style="--btn-color: #34d399" aria-label="Green accent"></button>
          <button class="color-btn" data-color="orange" style="--btn-color: #fb923c" aria-label="Orange accent"></button>
          <button class="color-btn" data-color="pink" style="--btn-color: #f472b6" aria-label="Pink accent"></button>
        </div>
      </div>

      <div class="settings-section">
        <label class="settings-label">Text Size</label>
        <div class="settings-row">
          <button class="size-btn" data-size="small">S</button>
          <button class="size-btn" data-size="medium">M</button>
          <button class="size-btn" data-size="large">L</button>
        </div>
      </div>

      <div class="settings-section">
        <label class="settings-label">Theme</label>
        <div class="settings-row">
          <button class="theme-btn" data-theme="dark">Dark</button>
          <button class="theme-btn" data-theme="light">Light</button>
        </div>
      </div>

      <div class="settings-section">
        <label class="settings-label">Sound on Complete</label>
        <div class="settings-row">
          <button class="toggle-btn" id="soundToggle">On</button>
        </div>
      </div>

      <div class="settings-section">
        <label class="settings-label">Hooks</label>
        <div class="settings-row">
          <button class="hook-btn" id="hookBtn">Configure Hooks</button>
          <span class="hook-status" id="hookStatus"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="capsule.js"></script>
</body>
</html>
